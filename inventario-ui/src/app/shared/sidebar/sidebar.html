<aside class="fixed left-0 top-0 h-screen w-64 border-r border-slate-200 bg-white shadow-sm">
    <!-- Header del Menú -->
    <div class="flex h-16 items-center border-b border-slate-100 px-6">
        <span class="text-xl font-black text-blue-600 tracking-tighter">SISTEMA <span
                class="text-slate-900">ALMACÉN</span></span>
    </div>

    <nav class="p-4 space-y-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 px-2 mb-4">Menú Principal</p>

        <div *ngFor="let item of menuItems">
            <a [routerLink]="item.path" routerLinkActive="bg-blue-50 text-blue-600 border-blue-100"
                class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-600 transition-all hover:bg-slate-50 hover:text-slate-900 border border-transparent">
                <span class="text-lg">{{ item.icon }}</span>
                {{ item.label }}
            </a>
        </div>
    </nav>

    <div class="absolute bottom-0 w-full border-t border-slate-100 p-4 bg-slate-50/50">
        <p class="text-[10px] text-center text-slate-400 italic">v1.0.26 - Panel de Control</p>
    </div>
</aside>
