@if (isOpen) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
       (click)="close()">
    
    <!-- Contenedor del Modal -->
    <div class="w-full max-w-lg overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200 animate-in fade-in zoom-in duration-200"
         (click)="$event.stopPropagation()">
      
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-slate-100 bg-slate-50/50 px-6 py-4">
        <h3 class="text-xl font-bold text-slate-800">{{ title }}</h3>
        <button (click)="close()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
      </div>

      <!-- Contenido -->
      <div class="p-6">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
