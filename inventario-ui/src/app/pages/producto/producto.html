<div class="min-h-screen bg-slate-50/50 p-4 md:p-8">
    <div class="mx-auto max-w-5xl">
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <h1 class="text-2xl font-bold text-slate-900">Productos</h1>
            <button type="button" (click)="showModal('create')"
                class="w-full sm:w-auto rounded-lg border bg-blue px-4 py-2 text-sm font-medium text-blue-600 shadow-sm hover:bg-blue-50">
                Agregar
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1">
        <div class="space-y-6">
            <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="mb-4 text-xs font-semibold uppercase text-slate-400">Productos</h2>

                <div class="p-0 sm:p-4">
                    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                        <app-producto-table [productos]="productos"
                            (onAction)="showModal($event.type, $event.data)"></app-producto-table>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<app-modal [isOpen]="isModalOpen" [title]="modalType === 'edit' ? 'Editar Producto' :
                                           modalType === 'create' ? 'Crear Producto' :
                                           modalType === 'detail' ? 'Detalle Producto' :
                                           modalType === 'delete' ? 'Eliminar Producto' : ''"
    (closeEvent)="isModalOpen = false">
    <app-producto-form [data]="selectedData" [mode]="modalType" (onSave)="handleSave($event)"
        (onCancel)="isModalOpen = false" [errors]="errors"></app-producto-form>
</app-modal>
