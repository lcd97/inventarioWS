<div class="min-h-screen bg-slate-50/50 p-4 md:p-8" [formGroup]="form">
    <div class="mx-auto max-w-5xl">
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <h1 class="text-2xl font-bold text-slate-900">Ingreso de Productos</h1>
            <button (click)="cancelar()"
                class="w-full sm:w-auto rounded-lg border bg-blue px-4 py-2 text-sm font-medium text-blue-600 shadow-sm hover:bg-blue-50">
                Regresar
            </button>
        </div>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">

            <div class="space-y-6 lg:col-span-1">
                <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
                    <h2 class="mb-4 text-xs font-semibold uppercase text-slate-400">Datos Generales</h2>

                    <div class="flex flex-col gap-4">
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-700">Código</label>
                            <input type="text" formControlName="codigo"
                                class="mt-1 w-full rounded-lg border border-slate-300 p-2 outline-hidden focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-700">Sucursal</label>
                            <select formControlName="sucursalId"
                                class="mt-1 w-full rounded-lg border border-slate-300 p-2 outline-hidden focus:ring-2 focus:ring-blue-500">
                                <option [value]="null">-- Seleccione una sucursal --</option>
                                <option *ngFor="let s of sucursales" [value]="s.id">{{ s.nombre }}</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-700">Fecha</label>
                            <input type="date" formControlName="fechaIngreso"
                                class="mt-1 w-full rounded-lg border border-slate-300 p-2 outline-hidden focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
                    <div class="flex items-center justify-between border-b border-slate-100 p-4">
                        <h2 class="text-xs font-semibold uppercase text-slate-400">Productos</h2>
                        <button type="button" (click)="agregarProducto()"
                            class="rounded-md bg-blue-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-blue-700">
                            Agregar
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <app-entrada-form-table [parentForm]="form" [productos]="productos"
                            (onRemove)="removerProducto($event)">
                        </app-entrada-form-table>
                    </div>

                    <div class="border-t border-slate-100 bg-slate-50/30 p-4 flex justify-end">
                        <button type="button" (click)="guardar()"
                            class="w-full sm:w-auto rounded-lg border bg-white px-4 py-2 text-sm font-medium text-green-600 shadow-sm hover:bg-green-50">
                            Guardar
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
